<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> Contact me | Anaiah Kyrie Pinalba</title>
      <script src="https://cdn.tailwindcss.com"></script>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Coiny&family=Gwendolyn:wght@700&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="style.css">

</head>

<body class="m-0 flex flex-col min-h-screen bg-[url('images/bgs/stripebg.png')] bg-repeat bg-left-top bg-fixed font-sans text-[#3e5f4f]">
<div class="w-[92%] max-w-[1100px] mx-auto my-10 md:my-[60px]
            bg-white/10
            backdrop-blur-xl backdrop-saturate-150
            border border-white/25
            rounded-[16px]
            shadow-[0_0_70px_rgba(255,179,198,0.30)]
            overflow-hidden flex flex-col">

  <header class="h-[180px] md:h-[260px] flex items-center justify-center relative bg-cover"
            style="background-image: url('images/bgs/bg1.png');">
    </header>

  <div class="flex flex-col md:flex-row">

    <aside class="w-full md:w-[260px] p-4 md:p-5
                  bg-white/10 backdrop-blur-xl
                  border-b md:border-b-0 md:border-r border-white/20">

      <nav class="grid grid-cols-2 gap-3 md:flex md:flex-col md:gap-4">

        <a href="index.html"
           class="coiny-regular bg-[#ffb3c6] text-center py-2 px-4 md:py-3 rounded-xl text-[#3e5f4f]
                  text-[14px] md:text-[16px] transition hover:bg-[#ff6f91] hover:text-white">
          Home
        </a>

        <a href="about.html"
           class="coiny-regular bg-[#ffb3c6] text-center py-2 px-4 md:py-3 rounded-xl text-[#3e5f4f]
                  text-[14px] md:text-[16px] transition hover:bg-[#ff6f91] hover:text-white">
          About
        </a>

        <a href="tech-stack.html"
           class="coiny-regular bg-[#ffb3c6] text-center py-2 px-4 md:py-3 rounded-xl text-[#3e5f4f]
                  text-[14px] md:text-[16px] transition hover:bg-[#ff6f91] hover:text-white">
          Tech Stack
        </a>

        <a href="certs.html"
           class="coiny-regular bg-[#ffb3c6] text-center py-2 px-4 md:py-3 rounded-xl text-[#3e5f4f]
                  text-[14px] md:text-[16px] transition hover:bg-[#ff6f91] hover:text-white">
          Certifications
        </a>

        <a href="contacts.html"
           class="coiny-regular bg-[#ff6f91] text-white text-center py-2 px-4 md:py-3 rounded-xl">
          Contact Me
        </a>

      </nav>
    </aside>

    <main class="flex-1 p-6 md:p-10 text-center bg-white/5 backdrop-blur-xl">

      <h1 class="coiny-regular text-lg md:text-xl font-bold text-[#ff6f91]
                 bg-[#ffb3c6] inline-block px-5 md:px-6 py-2 md:py-3 rounded-full
                 shadow-md mb-6">
        Contact Me
      </h1>

      <div class="flex justify-center">

        <form action="https://formspree.io/f/mkoybwnl" method="POST"
              class="w-full max-w-[400px] bg-white/20 backdrop-blur-md
                     border border-white/30
                     rounded-[16px]
                     shadow-md
                     p-6 flex flex-col gap-4">

          <input type="text" name="name" placeholder="Your Name" required
                 class="w-full h-[45px] px-3 rounded-xl border border-white/40 bg-white/70 outline-none">

          <input type="email" name="email" placeholder="Your Email" required
                 class="w-full h-[45px] px-3 rounded-xl border border-white/40 bg-white/70 outline-none">

          <textarea name="message" placeholder="Your Message" required
                    class="w-full h-[120px] p-3 rounded-xl border border-white/40 bg-white/70 outline-none resize-none"></textarea>

          <button type="submit"
                  class="bg-[#ff6f91] text-white py-2 rounded-xl font-semibold hover:bg-[#ff4f78] transition">
            Send Message
          </button>

        </form>

      </div>

    </main>

  </div>

</div>

</body>
</html>
