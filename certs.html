<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Anaiah Kyrie Pinalba | Certifications</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-0 flex flex-col min-h-screen bg-[url('images/bgs/bg1.png')] bg-cover bg-fixed font-sans text-[#3e5f4f]">

  <div class="w-[92%] max-w-[1100px] mx-auto my-10 md:my-[60px]
              bg-white/10 backdrop-blur-xl backdrop-saturate-150
              border border-white/25
              rounded-[16px]
              shadow-[0_0_70px_rgba(255,179,198,0.30)]
              overflow-hidden flex flex-col">
              
    <header class="h-[180px] md:h-[260px] flex items-center justify-center relative bg-cover bg-center"
            style="background-image: url('images/bgs/bg1.png');">
    </header>
  
    <div class="flex flex-col md:flex-row">
  
      <aside class="w-full md:w-[260px] p-4 md:p-5
                    bg-white/10 backdrop-blur-xl
                    border-b md:border-b-0 md:border-r border-white/20">
  
        <h2 class="text-lg font-bold text-[#ff6f91] mb-3 border-b border-white/20 pb-2 text-center md:text-left">
          Navigation
        </h2>
  
        <nav class="flex md:flex-col gap-2 md:gap-4 overflow-x-auto md:overflow-visible whitespace-nowrap pb-2 md:pb-0">
  
          <a href="index.html" class="bg-[#ffb3c6] py-2 px-4 rounded-xl text-center hover:bg-[#ff6f91] hover:text-white">Home</a>
          <a href="about.html" class="bg-[#ffb3c6] py-2 px-4 rounded-xl text-center hover:bg-[#ff6f91] hover:text-white">About</a>
          <a href="tech-stack.html" class="bg-[#ffb3c6] py-2 px-4 rounded-xl text-center hover:bg-[#ff6f91] hover:text-white">Tech Stack</a>
          <a href="certs.html" class="bg-[#ff6f91] text-white py-2 px-4 rounded-xl text-center">Certifications</a>
          <a href="contacts.html" class="bg-[#ffb3c6] py-2 px-4 rounded-xl text-center hover:bg-[#ff6f91] hover:text-white">Contact</a>
  
        </nav>
      </aside>
  
      <main class="flex-1 p-6 md:p-10 text-center bg-white/5 backdrop-blur-xl">
  
        <h1 class="text-lg md:text-xl font-bold text-[#ff6f91]
                   bg-[#ffb3c6] inline-block px-6 py-3 rounded-full shadow-md mb-8">
          Certifications
        </h1>
  
        <div class="flex justify-center flex-wrap gap-10">
  
          <div class="w-[300px]
                      rounded-xl overflow-hidden
                      bg-white/10 backdrop-blur-md
                      border border-white/20
                      shadow-[0_0_25px_rgba(255,179,198,0.25)]
                      transition duration-300 hover:-translate-y-2">
  
            <img src="images/certs/Pinalba_Word.png"
                 class="w-full h-[220px] object-contain bg-white/10 rounded-lg
                        cursor-pointer transition duration-300 hover:scale-105"
                 onclick="openModal(this.src)"
                 alt="Microsoft Word Certificate">
  
            <a href="https://www.certiport.com/portal/pages/credentialverification.aspx"
               target="_blank"
               class="block p-4 text-[#ff6f91]
                      bg-white/10 backdrop-blur-md
                      hover:bg-[#ffb3c6] hover:text-white
                      transition duration-300">
  
              <div class="font-bold text-base">
                Microsoft Word Certification
              </div>
  
              <div class="text-[13px] opacity-80">
                Certiport
              </div>
  
            </a>
          </div>
  
        </div>
  
      </main>
    </div>
  </div>
  
  <div id="modal"
       class="hidden fixed inset-0 z-[999]
              bg-black/70 flex items-center justify-center p-4"
       onclick="closeModal()">
  
    <img id="modalImg"
         class="w-[70%] max-w-[800px] rounded-xl shadow-2xl object-contain">
  </div>
  
  <script>
    function openModal(src) {
      document.getElementById("modal").classList.remove("hidden");
      document.getElementById("modalImg").src = src;
    }
  
    function closeModal() {
      document.getElementById("modal").classList.add("hidden");
    }
  </script>
  
  
</body>
</html>
