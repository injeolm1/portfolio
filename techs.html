<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Anaiah Kyrie Pinalba | Web Portfolio</title>
        <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="m-0 flex flex-col min-h-screen bg-[url('icons/bgs/bg1.png')] bg-cover bg-fixed font-sans text-[#3e5f4f]">

<div class="w-[92%] max-w-[1100px] mx-auto my-10 md:my-[60px]
            bg-white/10
            backdrop-blur-xl backdrop-saturate-150
            border border-white/25
            rounded-[16px]
            shadow-[0_0_70px_rgba(255,179,198,0.30)]
            overflow-hidden flex flex-col">

  <header class="h-[180px] md:h-[260px] flex items-center justify-center relative bg-cover bg-center"

  <div class="flex flex-col md:flex-row">

    <aside class="w-full md:w-[260px] p-4 md:p-5
                  bg-white/10 backdrop-blur-xl
                  border-b md:border-b-0 md:border-r border-white/20">

      <h2 class="text-lg font-bold text-[#ff6f91] mb-3 border-b border-white/20 pb-2 text-center md:text-left">
        Navigation
      </h2>

      <nav class="flex md:flex-col gap-2 md:gap-4 overflow-x-auto md:overflow-visible whitespace-nowrap pb-2 md:pb-0">

        <a href="index.html" class="bg-[#ffb3c6] text-center py-2 px-4 rounded-xl hover:bg-[#ff6f91] hover:text-white">Home</a>
        <a href="about.html" class="bg-[#ffb3c6] text-center py-2 px-4 rounded-xl hover:bg-[#ff6f91] hover:text-white">About Me</a>
        <a href="techs.html" class="bg-[#ff6f91] text-white text-center py-2 px-4 rounded-xl">Tech Stack</a>
        <a href="certs.html" class="bg-[#ffb3c6] text-center py-2 px-4 rounded-xl hover:bg-[#ff6f91] hover:text-white">Certifications</a>
        <a href="contacts.html" class="bg-[#ffb3c6] text-center py-2 px-4 rounded-xl hover:bg-[#ff6f91] hover:text-white">Contact</a>

      </nav>
    </aside>

        Tech Stack

      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-[750px] mx-auto">

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="icons/techstack/html.png" class="w-full h-full object-contain" alt="HTML">

          <p class="text-sm mt-2">HTML</p>
        </div>

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="icons/techstack/css.png" class="w-full h-full object-contain" alt="CSS">
          </div>
          <p class="text-sm mt-2">CSS</p>
        </div>

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">

          <div class="w-12 h-12 flex items-center justify-center">

          <p class="text-sm mt-2">Java</p>

      <div class="grid grid-cols-2 md:grid-cols-3 gap-6 max-w-[750px] mx-auto">

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="icons/tools/vscode.png" class="w-full h-full object-contain" alt="VS Code">
          </div>
          <p class="text-sm mt-2">VS Code</p>
        </div>

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="icons/tools/git.png" class="w-full h-full object-contain" alt="Git">
          </div>
          <p class="text-sm mt-2">Git</p>
        </div>

        <div class="bg-white/10 rounded-xl p-4 border border-white/20 flex flex-col items-center
                    transition duration-300 hover:scale-105 hover:shadow-[0_0_20px_rgba(255,111,145,0.4)]">
          <div class="w-12 h-12 flex items-center justify-center">
            <img src="icons/tools/github.png" class="w-full h-full object-contain" alt="GitHub">
          </div>
          <p class="text-sm mt-2">GitHub</p>
        </div>
